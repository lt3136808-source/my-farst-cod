Name: Run Chat API

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # تم تصحيح node-size إلى node-version

    - name: Install Dependencies
      run: |
        if [ -f package.json ]; then
          npm install
        fi

    - name: Run API Server
      env:
        GITHUB_KEY: ${{ secrets.GH_TOKEN }} 
        GEMINI_API_KEY: ${{ secrets.GH_TOKEN }}
      run: node api/chat-api.js
